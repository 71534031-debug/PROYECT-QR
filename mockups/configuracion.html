<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configuración - Mockup</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#f5f5f5}
    .layout{display:flex;min-height:100vh}
    .sidebar{width:240px;background:#1a1a1a;padding:24px;color:#fff}
    .sidebar .logo{font-size:18px;font-weight:700;color:#C5954C;margin-bottom:32px}
    .sidebar .logo span{display:block;font-size:11px;font-weight:400;color:#888}
    .sidebar nav a{display:block;padding:10px 14px;color:#aaa;text-decoration:none;border-radius:8px;font-size:14px;margin-bottom:4px;transition:.2s}
    .sidebar nav a:hover,.sidebar nav a.active{background:#333;color:#fff}
    .sidebar nav a.active{color:#C5954C}
    .main{flex:1;padding:24px 32px}
    .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
    .topbar h1{font-size:22px;color:#1a1a1a}
    .content{display:flex;gap:24px}
    .tabs{width:200px}
    .tabs a{display:block;padding:12px 16px;background:#fff;border-radius:8px;margin-bottom:4px;text-decoration:none;color:#555;font-size:13px;font-weight:500;transition:.2s}
    .tabs a:hover,.tabs a.active{background:#8B1A1A;color:#fff}
    .form-wrap{flex:1;background:#fff;border-radius:12px;padding:28px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
    .form-wrap h3{font-size:16px;color:#1a1a1a;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid #f0f0f0}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
    .field label{display:block;font-size:12px;font-weight:500;color:#888;margin-bottom:4px}
    .field input{width:100%;padding:10px 12px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:13px;transition:.2s}
    .field input:focus{outline:none;border-color:#8B1A1A}
    .full{grid-column:1/-1}
    .upload-row{display:flex;gap:20px;margin-top:8px;padding:16px;background:#fafafa;border-radius:8px;align-items:center}
    .upload-box{width:80px;height:80px;border:1.5px dashed #ddd;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#aaa;cursor:pointer;flex-shrink:0}
    .upload-box:hover{border-color:#8B1A1A;color:#8B1A1A}
    .upload-box img{width:100%;height:100%;object-fit:contain;border-radius:6px}
    .btn{background:#8B1A1A;color:#fff;border:none;padding:11px 24px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:.2s;margin-top:8px}
    .btn:hover{background:#6e1515}
    .upload-info{flex:1}
    .upload-info p{font-size:12px;color:#888;margin-bottom:4px}
    .upload-info button{padding:5px 12px;border:1px solid #ddd;border-radius:6px;background:#fff;font-size:11px;cursor:pointer}
    .upload-info button:hover{border-color:#ef4444;color:#ef4444}
    .return{position:fixed;top:20px;left:260px;background:#fff;border:1px solid #ddd;padding:6px 14px;border-radius:8px;text-decoration:none;color:#666;font-size:12px;transition:.2s;z-index:10}
    .return:hover{border-color:#8B1A1A;color:#8B1A1A}
  </style>
</head>
<body>
  <a class="return" href="index.html">← Volver</a>
  <div class="layout">
    <div class="sidebar">
      <div class="logo">CERTIFICADOS QR<span>Sistema de Gestión</span></div>
      <nav>
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="actividades.html">📋 Actividades</a>
        <a href="participantes.html">👥 Participantes</a>
        <a href="plantillas.html">🎨 Plantillas</a>
        <a href="certificados.html">📜 Certificados</a>
        <a href="configuracion.html" class="active">⚙️ Configuración</a>
      </nav>
    </div>
    <div class="main">
      <div class="topbar">
        <h1>Configuración</h1>
      </div>
      <div class="content">
        <div class="tabs">
          <a href="#" class="active">📋 General</a>
          <a href="#">🖼️ Logo y Firma</a>
          <a href="#">📱 QR</a>
        </div>
        <div class="form-wrap">
          <h3>Información General</h3>
          <div class="row">
            <div class="field"><label>Institución</label><input type="text" value="Colegio de Ingenieros del Perú"></div>
            <div class="field"><label>Aplicación</label><input type="text" value="Sistema de Certificados QR"></div>
          </div>
          <div class="row">
            <div class="field"><label>Nombre de la Autoridad</label><input type="text" value="Ing. Juan Pérez López"></div>
            <div class="field"><label>Cargo de la Autoridad</label><input type="text" value="Decano Nacional"></div>
          </div>
          <div class="row">
            <div class="field"><label>Email de Contacto</label><input type="email" value="contacto@cip.org.pe"></div>
            <div class="field"><label>Teléfono</label><input type="text" value="(01) 456-7890"></div>
          </div>
          <div class="row full">
            <div class="field"><label>Dirección</label><input type="text" value="Av. Arequipa 1234, Lima"></div>
          </div>

          <h3 style="margin-top:28px">Logo y Firma</h3>
          <div class="upload-row">
            <div class="upload-box"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%238B1A1A'/%3E%3Ctext x='50' y='58' text-anchor='middle' fill='%23fff' font-size='14' font-weight='bold'%3ECIP%3C/text%3E%3C/svg%3E" alt="Logo"></div>
            <div class="upload-info"><p>Logo institucional (PNG, JPG, SVG — máx 5MB)</p><button>📁 Reemplazar</button></div>
          </div>
          <div class="upload-row" style="margin-top:12px">
            <div class="upload-box"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 40'%3E%3Ctext x='50' y='28' text-anchor='middle' fill='%23333' font-size='12' style='font-family: cursive'%3EJuan Pérez%3C/text%3E%3C/svg%3E" alt="Firma"></div>
            <div class="upload-info"><p>Firma digital (PNG, JPG — máx 5MB)</p><button>📁 Reemplazar</button></div>
          </div>

          <button class="btn">💾 Guardar Cambios</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
