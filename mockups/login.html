<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Mockup</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f5f5f5 0%, #e8e0d8 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { display: flex; max-width: 900px; width: 100%; background: #fff; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,.12); overflow: hidden; }
    .sidebar { width: 320px; background: #8B1A1A; padding: 40px 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; text-align: center; }
    .sidebar .badge { background: rgba(255,255,255,.15); padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; letter-spacing: 1px; margin-bottom: 20px; }
    .sidebar h1 { font-size: 22px; font-weight: 700; line-height: 1.3; }
    .sidebar p { font-size: 13px; opacity: .8; margin-top: 10px; }
    .form { flex: 1; padding: 48px 40px; }
    .form h2 { font-size: 24px; color: #1a1a1a; margin-bottom: 4px; }
    .form .sub { color: #888; font-size: 14px; margin-bottom: 32px; }
    .field { margin-bottom: 20px; }
    .field label { display: block; font-size: 13px; font-weight: 500; color: #555; margin-bottom: 6px; }
    .field input { width: 100%; padding: 12px 14px; border: 1.5px solid #e0e0e0; border-radius: 10px; font-size: 14px; transition: .2s; }
    .field input:focus { outline: none; border-color: #8B1A1A; box-shadow: 0 0 0 3px rgba(139,26,26,.1); }
    .btn { width: 100%; padding: 13px; background: #8B1A1A; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: .2s; margin-top: 8px; }
    .btn:hover { background: #6e1515; }
    .link { text-align: center; margin-top: 16px; }
    .link a { color: #8B1A1A; font-size: 13px; text-decoration: none; }
    .link a:hover { text-decoration: underline; }
    .return { position: fixed; top: 20px; left: 20px; background: #fff; border: 1px solid #ddd; padding: 8px 16px; border-radius: 8px; text-decoration: none; color: #666; font-size: 13px; transition: .2s; }
    .return:hover { border-color: #8B1A1A; color: #8B1A1A; }
  </style>
</head>
<body>
  <a class="return" href="index.html">← Volver</a>
  <div class="container">
    <div class="sidebar">
      <div class="badge">CIP</div>
      <h1>Sistema de Certificados QR</h1>
      <p>Plataforma de generación y validación de certificados digitales</p>
    </div>
    <div class="form">
      <h2>Iniciar Sesión</h2>
      <p class="sub">Ingresa tus credenciales para acceder al sistema</p>
      <div class="field">
        <label>Correo electrónico</label>
        <input type="email" placeholder="admin@cip.org.pe" value="admin@cip.org.pe">
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" placeholder="••••••••" value="123456">
      </div>
      <button class="btn">Iniciar Sesión</button>
      <div class="link"><a href="#">¿Olvidaste tu contraseña?</a></div>
    </div>
  </div>
</body>
</html>
